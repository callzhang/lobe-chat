name: Upstream Sync


permissions:
  contents: write
  issues: write
  actions: write


on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:


jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}


    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false


      - name: Clean issue notice
        if: ${{ github.event.repository.has_issues }}
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_FAIL_LABEL: '🚨 Sync Fail'
        run: |
          set -euo pipefail

          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "$SYNC_FAIL_LABEL" \
            --json number \
            --jq '.[].number' |
          while read -r issue_number; do
            if [ -n "$issue_number" ]; then
              gh issue close "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --reason completed
            fi
          done


      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: lobehub/lobehub
          upstream_sync_branch: main
          target_sync_branch: main
          # Use a PAT with workflow permission when syncing changes under .github/workflows.
          target_repo_token: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
          test_mode: false


      - name: Sync check
        if: ${{ failure() && github.event.repository.has_issues }}
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_FAIL_LABEL: '🚨 Sync Fail'
        run: |
          set -euo pipefail

          if ! gh label list \
            --repo "$GITHUB_REPOSITORY" \
            --search "$SYNC_FAIL_LABEL" \
            --json name \
            --jq '.[].name' |
            grep -Fxq "$SYNC_FAIL_LABEL"; then
            gh label create "$SYNC_FAIL_LABEL" \
              --repo "$GITHUB_REPOSITORY" \
              --color d73a4a \
              --description 'Upstream sync failed'
          fi

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title '🚨 同步失败 | Sync Fail' \
            --label "$SYNC_FAIL_LABEL" \
            --body-file - <<'EOF'
            Due to a change in the workflow file of the [LobeChat][lobechat] upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork. Please refer to the detailed [Tutorial][tutorial-en-US] for instructions.


            由于 [LobeChat][lobechat] 上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次，请查看 [详细教程][tutorial-zh-CN]


            ![](https://github-production-user-asset-6210df.s3.amazonaws.com/17870709/273954625-df80c890-0822-4ac2-95e6-c990785cbed5.png)


            [lobechat]: https://github.com/lobehub/lobe-chat
            [tutorial-zh-CN]: https://lobehub.com/zh/docs/self-hosting/advanced/upstream-sync
            [tutorial-en-US]: https://lobehub.com/docs/self-hosting/advanced/upstream-sync
          EOF
